<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Professor Dada's Pokémon Academy</title>
  <meta name="description" content="An audio-first Pokémon learning adventure for Alex." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7fc6e6" />

  <!-- iOS: install to home screen as a fullscreen, chrome-free app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Dada Academy" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- The whole splash is the tap target (big, forgiving, no-fail). -->
  <main id="splash" class="splash" role="button" tabindex="0" aria-label="Tap to play">
    <div class="splash__invite" aria-hidden="true">
      <span class="splash__finger">👆</span>
      <span class="splash__label">Tap to Play</span>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
